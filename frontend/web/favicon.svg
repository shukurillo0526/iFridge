<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Squircle rounding mask similar to Apple/Instagram -->
    <clipPath id="squircle">
      <rect width="100" height="100" rx="25" ry="25"/>
    </clipPath>
  </defs>
  <!-- Zooms into the image by 24% to remove unwanted border backgrounds -->
  <image href="favicon.png" x="-12" y="-12" width="124" height="124" clip-path="url(#squircle)"/>
</svg>
